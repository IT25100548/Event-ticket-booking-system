<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f4f4f4;
            text-align:center;
        }

        h1{
            background-color:#2c3e50;
            color:white;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            margin:20px auto;
            width:300px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        button{
            padding:10px 20px;
            margin:10px;
            border:none;
            background:#3498db;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }
    </style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="card">
    <h3>Total Events</h3>
    <p>10</p>
</div>

<div class="card">
    <h3>Total Users</h3>
    <p>20</p>
</div>

<div class="card">
    <h3>Total Bookings</h3>
    <p>35</p>
</div>

<button>Manage Events</button>
<button>Manage Users</button>
<button>View Reports</button>

</body>
</html>
